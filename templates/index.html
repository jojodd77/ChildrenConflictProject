<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>儿童社交冲突调节平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;700;900&display=swap" rel="stylesheet" />
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}?v=120" />

    <style>
      body, button, input, textarea, select { font-family: 'Noto Sans SC', sans-serif !important; color: #1E293B !important; -webkit-font-smoothing: antialiased !important; }
      input::placeholder, textarea::placeholder { color: #94A3B8 !important; font-weight: 600 !important; }

      /* 统一图标 */
      i[class^="ph-"] { font-size: 1.3em !important; vertical-align: -0.18em !important; margin-right: 4px !important; }
      .btn-sound, .btn-sound-light { cursor: pointer; display: flex; align-items: center; justify-content: center; }
      
      /* 卡片与气泡 */
      .card, .bubble, .avatar, .input, .textarea, .btn, .chip, .presence, .hero__image, .modal__panel, .pause-box, .report-card-super, .super-tip-box, .heart-match-container, .quote-box, #modalClose, .modal-mic-container, .super-btn {
          box-shadow: none !important; border: 3px solid #1E293B !important;
      }

      /* 精简排版 */
      .contextCard { padding: 16px 0 !important; background: #FFFFFF !important; }
      .contextCard .card__title { padding: 0 24px 12px 24px !important; }
      .contextCard .story { border: 2px dashed #CBD5E1 !important; border-radius: 16px !important; padding: 16px 24px !important; margin: 0 16px 16px 16px !important; font-size: 16px !important; font-weight: 600 !important; line-height: 1.8 !important; color: #334155 !important; }
      .contextCard .systemNotice { background: #FEF9C3 !important; border: 2px dashed #F59E0B !important; color: #B45309 !important; padding: 12px 16px !important; border-radius: 16px !important; font-weight: 700 !important; font-size: 15px !important; margin: 0 16px !important; }

      /* 思考胶囊优化 */
      .typing-indicator-wrapper { display: flex; justify-content: center; width: 100%; padding: 16px 0 !important; }
      .typing-indicator { display: none; padding: 8px 16px; background: #FEF3C7 !important; color: #B45309 !important; align-items: center; gap: 8px; width: fit-content; border-radius: 32px !important; font-weight: 700; font-size: 14px; margin: 0 !important; }
      .typing-indicator.active { display: flex; }

      /* 聊天气泡 */
      .msg { width: 100% !important; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
      .msg--right { flex-direction: row-reverse; }
      .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; flex-shrink: 0; }
      .bubble { padding: 12px 16px; border-radius: 20px !important; font-size: 16px; font-weight: 600; line-height: 1.6; max-width: 75%; }
      .btn-sound { background: #E2E8F0; width: 36px; height: 36px; border-radius: 50%; border: 3px solid #1E293B !important; }

      /* 匹配度气泡 (不再撑满全屏) */
      .heart-match-container { 
          max-width: 85%; 
          margin: 10px auto; 
          padding: 20px; 
          border-radius: 20px !important; 
          background: #FFFBEB; 
      }
    </style>
  </head>
  <body>
    <div id="globalLoading" class="modal loadingOverlay" aria-hidden="true">
        <div class="magic-spinner">✨</div>
        <div class="loading-text">法官精灵正在为你编织故事剧本，请稍等...</div>
    </div>

    <script>
        // ... 省略其他逻辑 ...
        
        function renderHeartCard(result) {
            if (!result) return "";
            const score = Math.max(0, Math.min(100, Math.round(result.misinterpretation * 100))); 
            const matchPercent = 100 - score; 
            
            let theme = { bg: '#FFFBEB', text: '#B45309', track: '#FBBF24' };
            const pos = (matchPercent / 100) * 40;

            const guidanceText = result.guidance ? toChineseQuotes(result.guidance) : '';
            const comfortText = result.comfort ? toChineseQuotes(result.comfort) : '';

            // 修复：喇叭移到右侧，排版紧凑
            const buildAdvice = (label, text) => text ? `
              <div style="display:flex; align-items:center; gap:10px; margin-top:10px;">
                <div style="flex:1; background: white; padding: 10px 14px; border-radius: 12px; border: 2px solid #E2E8F0; text-align: left; font-size: 14px; font-weight: 600;">
                    <span style="color:${theme.text};">${label}</span><br/>${escapeHtml(text)}
                </div>
                <button class="btn-sound" onclick="window.speakText('${escapeHtml(text)}', this)"><i class="ph-bold ph-speaker-high"></i></button>
              </div>` : '';

            return `
              <div class="heart-match-container">
                <div style="font-size:15px; font-weight:900; margin-bottom:15px; display:flex; align-items:center; justify-content:center;"><i class="ph-fill ph-heart-straight"></i> 想法匹配度: ${matchPercent}%</div>
                <div class="heart-track" style="height:32px;">
                    <div style="position:absolute; top:50%; left:0; right:0; height:8px; background: white; border: 3px solid #1E293B; border-radius: 4px; transform: translateY(-50%);"></div>
                    <div style="position:absolute; top:50%; left:0; width:calc(${pos}% + 6px); height:8px; background: ${theme.track}; border: 3px solid #1E293B; border-radius: 4px 0 0 4px; transform: translateY(-50%);"></div>
                    <div class="heart" style="left: ${pos}%; top:50%; width: 32px; height: 32px; background: #DBEAFE; border: 3px solid #1E293B; border-radius: 50%; font-weight:900;">A</div>
                    <div class="heart" style="right: ${pos}%; top:50%; width: 32px; height: 32px; background: #FEE2E2; border: 3px solid #1E293B; border-radius: 50%; font-weight:900;">B</div>
                </div>
                ${appState.role === result.triggeredBy ? buildAdvice('给你的悄悄话：', guidanceText) : buildAdvice('给对方的安抚：', comfortText)}
              </div>
            `;
        }
        // ... 其余逻辑保持不变 ...
      })();
    </script>
  </body>
</html>
